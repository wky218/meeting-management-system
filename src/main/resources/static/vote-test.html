<!DOCTYPE html>
<html>
<head>
    <title>投票测试</title>
    <meta charset="UTF-8">
    <style>
        .control-panel {
            margin: 20px;
            padding: 20px;
            border: 1px solid #ccc;
        }
        .vote-list {
            margin-top: 20px;
        }
        .vote-item {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <h2>投票测试</h2>
        <div>
            <label>会议ID：</label>
            <input type="text" id="meetingId" value="1912158389469364225">
            <label>用户ID：</label>
            <input type="text" id="userId" value="1912151761567330306">
        </div>
        
        <!-- 创建投票 -->
        <div style="margin-top: 20px;">
            <h3>创建投票</h3>
            <div>
                <label>标题：</label>
                <input type="text" id="voteTitle" value="测试投票">
            </div>
            <div>
                <label>选项（用逗号分隔）：</label>
                <input type="text" id="voteOptions" value="选项1,选项2,选项3">
            </div>
            <div>
                <label>截止时间：</label>
                <input type="datetime-local" id="endTime">
            </div>
            <button onclick="createVote()">创建投票</button>
        </div>

        <!-- 投票列表 -->
        <div class="vote-list">
            <h3>投票列表</h3>
            <button onclick="getVoteList()">刷新列表</button>
            <div id="voteListContainer"></div>
        </div>
    </div>

    <script>
        // 创建投票
        async function createVote() {
            const meetingId = document.getElementById('meetingId').value;
            const title = document.getElementById('voteTitle').value;
            const options = document.getElementById('voteOptions').value.split(',');
            const endTime = document.getElementById('endTime').value;

            try {
                const response = await fetch('/api/vote/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        meetingId: meetingId,
                        title: title,
                        options: options,
                        endTime: endTime
                    })
                });

                const data = await response.json();
                if (data.code === 200) {
                    alert('创建投票成功');
                    getVoteList();
                } else {
                    alert('创建投票失败: ' + data.message);
                }
            } catch (error) {
                console.error('创建投票失败:', error);
                alert('创建投票失败');
            }
        }

        // 获取投票列表
        async function getVoteList() {
            const meetingId = document.getElementById('meetingId').value;
            try {
                const response = await fetch(`/api/vote/list/${meetingId}`);
                const data = await response.json();
                
                if (data.code === 200) {
                    displayVoteList(data.data);
                } else {
                    alert('获取投票列表失败: ' + data.message);
                }
            } catch (error) {
                console.error('获取投票列表失败:', error);
                alert('获取投票列表失败');
            }
        }

        // 提交投票
        async function submitVote(voteId, optionId) {
            const userId = document.getElementById('userId').value;
            try {
                const response = await fetch('/api/vote/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        voteId: voteId,
                        userId: userId,
                        optionId: optionId
                    })
                });

                const data = await response.json();
                if (data.code === 200) {
                    alert('投票成功');
                    getVoteList();
                } else {
                    alert('投票失败: ' + data.message);
                }
            } catch (error) {
                console.error('投票失败:', error);
                alert('投票失败');
            }
        }

        // 显示投票列表
        function displayVoteList(votes) {
            const container = document.getElementById('voteListContainer');
            container.innerHTML = '';

            votes.forEach(vote => {
                const voteElement = document.createElement('div');
                voteElement.className = 'vote-item';
                voteElement.innerHTML = `
                    <h4>${vote.title}</h4>
                    <p>截止时间: ${vote.endTime}</p>
                    <p>状态: ${vote.status}</p>
                    <div>
                        ${vote.options.map(option => `
                            <div>
                                <input type="radio" name="vote_${vote.id}" value="${option.id}">
                                <label>${option.content} (${option.count}票)</label>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="submitVote('${vote.id}', document.querySelector('input[name=vote_${vote.id}]:checked').value)">
                        提交投票
                    </button>
                `;
                container.appendChild(voteElement);
            });
        }

        // 设置默认的截止时间（24小时后）
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('endTime').value = tomorrow.toISOString().slice(0, 16);

        // 初始加载投票列表
        getVoteList();
    </script>
</body>
</html>
